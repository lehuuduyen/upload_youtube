version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./storage:/app/storage
      - ./client_secrets.json:/app/client_secrets.json:ro
      - ./client_secret_nhi.json:/app/client_secret_nhi.json:ro
    environment:
      - APP_BASE_DIR=/app
      - DATABASE_URL=sqlite:////app/storage/app.db
      - SCHEDULER_TIMEZONE=Asia/Ho_Chi_Minh
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  storage:
